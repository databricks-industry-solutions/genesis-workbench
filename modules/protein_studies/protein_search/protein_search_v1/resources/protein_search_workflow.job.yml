resources:
  jobs:
    protein_search_workflow:
      name: protein_search_workflow

      email_notifications:
        on_failure:
          - ${var.current_user}

      tasks:

        - task_key: download_uniprot_fasta
          job_cluster_key: multi_a10_gpu_cluster
          notebook_task:
            notebook_path: ../notebooks/01_download_uniprot_fasta.py
            source: WORKSPACE

        - task_key: create_tables
          depends_on:
            - task_key: download_uniprot_fasta
          job_cluster_key: multi_a10_gpu_cluster
          notebook_task:
            notebook_path: ../notebooks/02_create_tables.py
            source: WORKSPACE

        - task_key: protein_classification
          depends_on:
            - task_key: create_tables
          job_cluster_key: multi_a10_gpu_cluster
          notebook_task:
            notebook_path: ../notebooks/03_protein_classification.py
            source: WORKSPACE

        - task_key: ai_enrichment
          depends_on:
            - task_key: protein_classification
          job_cluster_key: multi_a10_gpu_cluster
          notebook_task:
            notebook_path: ../notebooks/04_ai_enrichment.py
            source: WORKSPACE

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: volume_name
          default: ${resources.volumes.protein_seq_volume.name}
        - name: foundation_model_endpoint
          default: databricks-claude-sonnet-4-5
        - name: user_email
          default: ${var.current_user}
        - name: sql_warehouse_id
          default: ${var.sql_warehouse_id}
        - name: experiment_name
          default: ${var.module_registration_experiment_name}

      job_clusters:
        - job_cluster_key: multi_a10_gpu_cluster
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-gpu-ml-scala2.12
            spark_conf:
              spark.master: "local[*, 4]"
              spark.databricks.cluster.profile: singleNode
            node_type_id: g5.12xlarge
            driver_node_type_id: g5.12xlarge
            custom_tags:
              ResourceClass: SingleNode
              work_type: protein_search_classification
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
            aws_attributes:
              availability: ON_DEMAND

      tags: ${var.common_resource_tags}

      queue:
        enabled: true
