bundle:
  name: genesis_workbench_alphafold2
  databricks_cli_version: ">=0.295.*"

include:
  - variables.yml
  - resources/*.yml

targets:
  prod_aws:
    mode: production
    default: true
    workspace:
      root_path: ${var.current_working_directory}
    permissions:
      - user_name: ${var.current_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.current_user}
    resources:
      jobs:
        alphafold:
          job_clusters:
            - job_cluster_key: fold_cluster
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND
        alphafold_register_and_downloads:
          job_clusters:
            - job_cluster_key: download_common_files_cluster
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND
            - job_cluster_key: download_params_cluster
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND
            - job_cluster_key: download_unirefs_cluster
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND
            - job_cluster_key: download_mgnifyPLUS_cluster
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND
            - job_cluster_key: download_uniprot_cluster
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND
            - job_cluster_key: pdb_mmcif_cluster
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND

  prod_azure:
    mode: production
    workspace:
      root_path: ${var.current_working_directory}
    permissions:
      - user_name: ${var.current_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.current_user}
    resources:
      jobs:
        alphafold:
          job_clusters:
            - job_cluster_key: fold_cluster
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE
        alphafold_register_and_downloads:
          job_clusters:
            - job_cluster_key: download_common_files_cluster
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE
            - job_cluster_key: download_params_cluster
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE
            - job_cluster_key: download_unirefs_cluster
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE
            - job_cluster_key: download_mgnifyPLUS_cluster
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE
            - job_cluster_key: download_uniprot_cluster
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE
            - job_cluster_key: pdb_mmcif_cluster
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE

  prod_gcp:
    mode: production
    workspace:
      root_path: ${var.current_working_directory}
    permissions:
      - user_name: ${var.current_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.current_user}
    resources:
      jobs:
        alphafold:
          job_clusters:
            - job_cluster_key: fold_cluster
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
        alphafold_register_and_downloads:
          job_clusters:
            - job_cluster_key: download_common_files_cluster
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
            - job_cluster_key: download_params_cluster
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
            - job_cluster_key: download_unirefs_cluster
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
            - job_cluster_key: download_mgnifyPLUS_cluster
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
            - job_cluster_key: download_uniprot_cluster
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
            - job_cluster_key: pdb_mmcif_cluster
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
