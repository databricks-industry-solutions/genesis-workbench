name: mlfow-env
channels:
  - conda-forge
  - nvidia
  - pytorch
  - nodefaults
dependencies:
  - python=3.11
  - conda-forge::packaging
  - conda-forge::ninja
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu121
    # torch 2.4.1+cu121 required because transformers>=4.41 (declared in
    # dbboltz/pyproject.toml) needs torch>=2.4. Without this, the Boltz served
    # endpoint silently disabled PyTorch at startup ("Disabling PyTorch because
    # PyTorch >= 2.4 is required but found 2.3.1+cu121") and every inference
    # request hung with no error. torchvision bumped to matching 0.19.1.
    - torch==2.4.1+cu121
    - torchvision==0.19.1+cu121
    - mlflow==2.15.1
    - cloudpickle==2.2.1
    - setuptools<82
    - transformers>=4.41,<4.50
    - sentence-transformers>=2.7,<3
    - /model/artifacts/dbboltz