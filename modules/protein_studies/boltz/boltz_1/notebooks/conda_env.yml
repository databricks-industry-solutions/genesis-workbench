name: mlfow-env
channels:
  - conda-forge
  - nvidia
  - pytorch
  - nodefaults
dependencies:
  - python=3.11
  - conda-forge::packaging
  - conda-forge::ninja
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - setuptools<82
    - torch==2.4.1+cu121
    - torchvision==0.19.1+cu121
    - mlflow==2.15.1
    - cloudpickle==2.2.1
    - transformers>=4.41,<4.50
    - sentence-transformers>=2.7,<3
    - /model/artifacts/dbboltz