resources:
  jobs:
    register_boltz:
      name: register_boltz

      email_notifications:
        on_failure:
          - ${var.current_user}

      tasks:
        - task_key: register_boltz_task
          environment_key: gpu_env
          compute:
            hardware_accelerator: "GPU_1xA10"
          notebook_task:
            notebook_path: ../notebooks/01_register_boltz.py

      environments:
        - environment_key: gpu_env
          spec:
            environment_version: "4"
            dependencies:
              - --extra-index-url https://download.pytorch.org/whl/cu121
              - torch>=2.4
              - mlflow>=2.15
              - databricks-sdk>=0.50.0

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: model_name
          default: boltz
        - name: cache_dir
          default: ${resources.volumes.boltz_cache_dir.name}
        - name: experiment_name
          default: ${var.module_registration_experiment_name}
        - name: sql_warehouse_id
          default: ${var.sql_warehouse_id}
        - name: user_email
          default: ${var.current_user}
        - name: workload_type
          default: ${var.gpu_small_setting}

      tags: ${var.common_resource_tags}
            
            