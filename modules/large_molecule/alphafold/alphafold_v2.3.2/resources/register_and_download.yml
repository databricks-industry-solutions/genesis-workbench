resources:
  jobs:
    alphafold_register_and_downloads:
      name: alphafold_register_and_downloads
      email_notifications:
        on_success:
          - ${var.current_user}
        on_failure:
          - ${var.current_user}
      notification_settings:
        no_alert_for_skipped_runs: true
        no_alert_for_canceled_runs: true

      tasks:

        - task_key: register_run_job
          max_retries: 0
          notebook_task:
            notebook_path: ../notebooks/register_alphafold_job.py
            source: WORKSPACE
          job_cluster_key: download_common_files_cluster
          health:
            rules:
              - metric: RUN_DURATION_SECONDS
                op: GREATER_THAN
                value: 300

        - task_key: common_files
          max_retries: 0
          depends_on:
            - task_key: register_run_job
          notebook_task:
            notebook_path: ../notebooks/download_common_files.py
            source: WORKSPACE
          job_cluster_key: download_common_files_cluster
          health:
            rules:
              - metric: RUN_DURATION_SECONDS
                op: GREATER_THAN
                value: 43200

        - task_key: download_mgnifyPLUS
          max_retries: 0
          notebook_task:
            notebook_path: ../notebooks/download_mgnify_smallbfd_pdb70_pdbseqres.py
            source: WORKSPACE
          job_cluster_key: download_mgnifyPLUS_cluster
          health:
            rules:
              - metric: RUN_DURATION_SECONDS
                op: GREATER_THAN
                value: 14400
          
        - task_key: download_params
          max_retries: 0
          notebook_task:
            notebook_path: ../notebooks/download_params.py
            source: WORKSPACE
          job_cluster_key: download_params_cluster
          timeout_seconds: 7200
          health:
            rules:
              - metric: RUN_DURATION_SECONDS
                op: GREATER_THAN
                value: 3600
          
        - task_key: download_uniprot
          max_retries: 0
          notebook_task:
            notebook_path: ../notebooks/download_uniprot.py
            source: WORKSPACE
          job_cluster_key: download_uniprot_cluster
          timeout_seconds: 21600
          health:
            rules:
              - metric: RUN_DURATION_SECONDS
                op: GREATER_THAN
                value: 14400
          
        - task_key: download_unirefs
          max_retries: 0
          notebook_task:
            notebook_path: ../notebooks/download_uniref90_uniref30.py
            source: WORKSPACE
          job_cluster_key: download_unirefs_cluster
          timeout_seconds: 36000
          health:
            rules:
              - metric: RUN_DURATION_SECONDS
                op: GREATER_THAN
                value: 12600
          
        - task_key: pdb_mmcif
          max_retries: 0
          notebook_task:
            notebook_path: ../notebooks/download_pdb_mmcif.py
            source: WORKSPACE
          job_cluster_key: pdb_mmcif_cluster
          health:
            rules:
              - metric: RUN_DURATION_SECONDS
                op: GREATER_THAN
                value: 43200

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: model_name
          default: alphafold2
        - name: model_volume
          default: alphafold
        - name: user_email
          default: ${var.current_user}
        - name: sql_warehouse_id 
          default: ${var.sql_warehouse_id}
        - name: run_alphafold_job_id
          default: ${resources.jobs.alphafold.id}
        - name: databricks_app_names
          default: genesis-workbench:mcp-genesis-workbench

              
      job_clusters:

        - job_cluster_key: download_common_files_cluster
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-scala2.12
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            node_type_id: ${var.cpu_node_type}
            driver_node_type_id: ${var.cpu_node_type}
            custom_tags:
              ResourceClass: SingleNode
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
            # On-demand avoids spot preemption during multi-hour model downloads

        - job_cluster_key: download_params_cluster
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-scala2.12
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            node_type_id: ${var.cpu_node_type}
            driver_node_type_id: ${var.cpu_node_type}
            custom_tags:
              ResourceClass: SingleNode
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
            cluster_log_conf:
              dbfs:
                destination: dbfs:/cluster-logs/alphafold-downloads

        - job_cluster_key: download_unirefs_cluster
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-scala2.12
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            node_type_id: ${var.cpu_node_type}
            driver_node_type_id: ${var.cpu_node_type}
            custom_tags:
              ResourceClass: SingleNode
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0

        - job_cluster_key: download_mgnifyPLUS_cluster
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-scala2.12
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            node_type_id: ${var.cpu_node_type}
            driver_node_type_id: ${var.cpu_node_type}
            custom_tags:
              ResourceClass: SingleNode
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0

        - job_cluster_key: download_uniprot_cluster
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-scala2.12
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            node_type_id: ${var.cpu_node_type}
            driver_node_type_id: ${var.cpu_node_type}
            custom_tags:
              ResourceClass: SingleNode
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0

        - job_cluster_key: pdb_mmcif_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            node_type_id: ${var.cpu_node_type}
            driver_node_type_id: ${var.cpu_node_type}
            custom_tags:
              ResourceClass: SingleNode
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
            cluster_log_conf:
              dbfs:
                destination: dbfs:/cluster-logs/alphafold-downloads

      tags: ${var.common_resource_tags}

      queue:
        enabled: true
