resources:
  jobs:
    register_genmol:
      name: register_genmol

      email_notifications:
        on_failure:
          - ${var.current_user}

      tasks:
        - task_key: register_genmol_generator
          # Classic single-node cluster pinned to DBR 15.4 LTS = Python 3.11.
          #
          # GenMol hard-pins pandas==2.1.0 and transformers==4.52.4. On serverless
          # (Python 3.12) pandas 2.1.0 has NO prebuilt wheel and its C source build
          # fails against the newer NumPy headers. On py3.11 those pins have wheels
          # and install cleanly. Logging the model from a py3.11 env also makes the
          # Model Serving endpoint inherit py3.11, so the exact same pins resolve at
          # endpoint-build time. Registration is CPU-only (the 89M model loads + does
          # a smoke generation on CPU fine); the *serving* endpoint is GPU via
          # deploy_model(workload_type=GPU_SMALL).
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: ${var.cpu_node_type}
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: SingleNode
          notebook_task:
            notebook_path: ../notebooks/01_register_genmol.py
            base_parameters:
              model_name: genmol
              cache_dir: genmol_cache

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: experiment_name
          default: ${var.module_registration_experiment_name}
        - name: sql_warehouse_id
          default: ${var.sql_warehouse_id}
        - name: user_email
          default: ${var.current_user}
        - name: workload_type
          default: ${var.gpu_small_setting}

      tags: ${var.common_resource_tags}
