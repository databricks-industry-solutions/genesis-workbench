resources:
  jobs:
    register_diffdock:
      name: register_diffdock_gwb

      email_notifications:
        on_failure:
          - ${var.current_user}

      job_clusters:
        - job_cluster_key: diffdock_gpu_cluster
          new_cluster:
            spark_version: "14.3.x-ml-gpu-scala2.12"
            node_type_id: ${var.a10_node_type}
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"
              spark.databricks.cluster.profile: singleNode
            custom_tags:
              ResourceClass: SingleNode

      tasks:
        - task_key: register_diffdock_molecular_docking
          job_cluster_key: diffdock_gpu_cluster
          notebook_task:
            notebook_path: ../notebooks/01_register_diffdock.py

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: model_name
          default: diffdock_v1
        - name: cache_dir
          default: ${resources.volumes.diffdock_cache_dir.name}
        - name: experiment_name
          default: ${var.module_registration_experiment_name}
        - name: sql_warehouse_id
          default: ${var.sql_warehouse_id}
        - name: user_email
          default: ${var.current_user}
        - name: workload_type
          default: ${var.gpu_small_setting}

      tags: ${var.common_resource_tags}
