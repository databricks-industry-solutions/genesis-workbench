resources:
  jobs:
    register_deepstabp:
      name: register_deepstabp_gwb

      email_notifications:
        on_failure:
          - ${var.current_user}

      job_clusters:
        - job_cluster_key: deepstabp_gpu_cluster
          new_cluster:
            num_workers: 0
            node_type_id: ${var.t4_node_type}
            driver_node_type_id: ${var.t4_node_type}
            spark_version: '16.4.x-gpu-ml-scala2.12'
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            single_user_name: ${workspace.current_user.userName}
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode

      tasks:
        - task_key: register_deepstabp_thermostability
          job_cluster_key: deepstabp_gpu_cluster
          notebook_task:
            notebook_path: ../notebooks/01_register_deepstabp.py

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: model_name
          default: deepstabp_v1
        - name: cache_dir
          default: ${resources.volumes.deepstabp_cache_dir.name}
        - name: experiment_name
          default: ${var.module_registration_experiment_name}
        - name: sql_warehouse_id
          default: ${var.sql_warehouse_id}
        - name: user_email
          default: ${var.current_user}
        - name: workload_type
          default: ${var.gpu_small_setting}
        - name: hf_backbone_id
          default: Rostlab/prot_t5_xl_uniref50
        - name: upstream_ckpt_url
          default: https://github.com/CSBiology/deepStabP/raw/main/src/Api/trained_model/b25_sampled_10k_tuned_2_d01/checkpoints/epoch%3D1-step%3D2316.ckpt

      tags: ${var.common_resource_tags}
