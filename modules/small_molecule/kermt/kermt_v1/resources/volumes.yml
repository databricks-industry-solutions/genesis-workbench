resources:
  volumes:
    kermt_cache_dir:
      name: ${var.cache_dir}
      catalog_name: ${var.core_catalog_name}
      schema_name: ${var.core_schema_name}
      volume_type: MANAGED
      comment: >-
        KERMT (Kinetic GROVER Multi-Task) artifacts — pretrained GROVERbase checkpoint
        (pretrained/), fine-tuned checkpoints (finetuned/<label>/), and bundled sample
        fine-tune datasets (ft_data/).
