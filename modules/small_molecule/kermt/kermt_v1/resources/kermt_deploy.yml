resources:
  jobs:
    kermt_deploy:
      name: kermt_deploy_job

      email_notifications:
        on_failure:
          - ${var.current_user}

      tasks:
        - task_key: kermt_deploy_task
          job_cluster_key: gpu_cluster
          notebook_task:
            notebook_path: ../notebooks/03_kermt_register_serving.py
          max_retries: 0

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: cache_dir
          default: ${var.cache_dir}
        - name: kermt_src_path
          default: ${workspace.file_path}/kermt_src
        - name: user_email
          default: ${var.current_user}
        - name: sql_warehouse_id
          default: ${var.sql_warehouse_id}
        - name: ft_id
          default: ""
        - name: model_name
          default: kermt_admet
        - name: workload_type
          default: ${var.gpu_small_setting}
        # Labeled holdout for probability calibration when the checkpoint has no
        # calibration.csv (e.g. models fine-tuned before that was added). Defaults to
        # the bundled TDC ClinTox test split.
        - name: calibration_data_location
          default: /Volumes/${var.core_catalog_name}/${var.core_schema_name}/${var.cache_dir}/ft_data/clintox_test.csv

      job_clusters:
        - job_cluster_key: gpu_cluster
          new_cluster:
            num_workers: 0
            node_type_id: ${var.t4_node_type}
            driver_node_type_id: ${var.t4_node_type}
            spark_version: 15.4.x-gpu-ml-scala2.12
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            single_user_name: ${workspace.current_user.userName}
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.databricks.unityCatalog.volumes.enabled: true
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode

      tags: ${var.common_resource_tags}
