bundle:
  name: genesis_workbench_kermt
  databricks_cli_version: ">=0.295.*"

include:
  - variables.yml
  - resources/*.yml

# Per-cloud targets. GWB rule: all workflow jobs run on ON_DEMAND compute (no spot)
# — the GPU finetune/deploy clusters are overlaid here per cloud.
targets:
  prod_aws:
    mode: production
    default: true
    workspace:
      root_path: ${var.current_working_directory}
    permissions:
      - user_name: ${var.current_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.current_user}
    resources:
      jobs:
        register_kermt:
          job_clusters:
            - job_cluster_key: stage_cluster
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND
        kermt_finetune:
          job_clusters:
            - job_cluster_key: gpu_cluster
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND

  prod_azure:
    mode: production
    workspace:
      root_path: ${var.current_working_directory}
    permissions:
      - user_name: ${var.current_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.current_user}
    resources:
      jobs:
        register_kermt:
          job_clusters:
            - job_cluster_key: stage_cluster
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE
        kermt_finetune:
          job_clusters:
            - job_cluster_key: gpu_cluster
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE

  prod_gcp:
    mode: production
    workspace:
      root_path: ${var.current_working_directory}
    permissions:
      - user_name: ${var.current_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.current_user}
    resources:
      jobs:
        register_kermt:
          job_clusters:
            - job_cluster_key: stage_cluster
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
        kermt_finetune:
          job_clusters:
            - job_cluster_key: gpu_cluster
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
