bundle:
  name: genesis_workbench_open_babel
  databricks_cli_version: ">=0.295.*"

include:
  - variables.yml
  - resources/*.yml

targets:
  prod:
    mode: production
    default: true
    workspace:
      root_path: ${var.current_working_directory}
    permissions:
      - user_name: ${var.current_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.current_user}
