resources:
  jobs:
    register_pltnum:
      name: register_pltnum_gwb

      email_notifications:
        on_failure:
          - ${var.current_user}

      job_clusters:
        - job_cluster_key: pltnum_gpu_cluster
          new_cluster:
            num_workers: 0
            node_type_id: ${var.t4_node_type}
            driver_node_type_id: ${var.t4_node_type}
            spark_version: '16.4.x-gpu-ml-scala2.12'
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            single_user_name: ${workspace.current_user.userName}
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode

      tasks:
        - task_key: register_pltnum_halflife
          job_cluster_key: pltnum_gpu_cluster
          notebook_task:
            notebook_path: ../notebooks/01_register_pltnum.py

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: model_name
          default: pltnum_v1
        - name: cache_dir
          default: ${resources.volumes.pltnum_cache_dir.name}
        - name: experiment_name
          default: ${var.module_registration_experiment_name}
        - name: sql_warehouse_id
          default: ${var.sql_warehouse_id}
        - name: user_email
          default: ${var.current_user}
        - name: workload_type
          default: ${var.gpu_small_setting}
        - name: hf_model_id
          default: sagawa/PLTNUM-ESM2-NIH3T3

      tags: ${var.common_resource_tags}
