resources:
  jobs:
    scanpy:
      name: run_scanpy_gwb

      email_notifications:
        on_failure:
          - ${var.current_user}

      tasks:
        - task_key: check_file_size
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/check_file_size.py
            base_parameters:
              data_path: ""
            source: WORKSPACE
        - task_key: check_small
          depends_on:
            - task_key: check_file_size
          condition_task:
            op: GREATER_THAN
            left: "{{tasks.check_file_size.values.file_size_gb}}"
            right: "4"
        - task_key: check_medium
          depends_on:
            - task_key: check_small
              outcome: "true"
          condition_task:
            op: GREATER_THAN
            left: "{{tasks.check_file_size.values.file_size_gb}}"
            right: "7"
        - task_key: check_large
          depends_on:
            - task_key: check_medium
              outcome: "true"
          condition_task:
            op: GREATER_THAN
            left: "{{tasks.check_file_size.values.file_size_gb}}"
            right: "14"
        - task_key: run_gt_large
          depends_on:
            - task_key: check_large
              outcome: "true"
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/analyze_single_h5ad.py
            base_parameters:
              data_path: ""
              gene_name_column: ""
              species: hsapiens
            source: WORKSPACE
        - task_key: run_lt_large
          depends_on:
            - task_key: check_large
              outcome: "false"
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/analyze_single_h5ad.py
            base_parameters:
              data_path: ""
              gene_name_column: ""
              species: hsapiens
            source: WORKSPACE
        - task_key: run_lt_medium
          depends_on:
            - task_key: check_medium
              outcome: "false"
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/analyze_single_h5ad.py
            base_parameters:
              data_path: ""
              gene_name_column: ""
              species: hsapiens
            source: WORKSPACE
        - task_key: run_lt_small
          depends_on:
            - task_key: check_small
              outcome: "false"
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/analyze_single_h5ad.py
            base_parameters:
              data_path: ""
              gene_name_column: ""
              species: hsapiens
            source: WORKSPACE

      environments:
        - environment_key: default
          spec:
            client: '4'

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: user_email
          default: ${var.current_user}
        - name: data_path
          default: dummy_data_path.h5ad
        - name: mlflow_experiment
          default: scanpy_genesis_workbench
        - name: mlflow_run_name
          default: scanpy_genesis_workbench
        - name: gene_name_column
          default: gene_name
        - name: min_genes
          default: 200
        - name: min_cells
          default: 3
        - name: pct_counts_mt
          default: 5
        - name: n_genes_by_counts
          default: 2500
        - name: target_sum
          default: 10000
        - name: n_top_genes
          default: 500
        - name: n_pcs
          default: 50
        - name: cluster_resolution
          default: 0.2

      tags: ${var.common_resource_tags}
