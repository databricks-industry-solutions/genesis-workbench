resources:
  jobs:
    register_scgpt:
      name: register_scgpt

      email_notifications:
        on_failure:
          - ${var.current_user}

      tasks:
        - task_key: register_scgpt_task
          environment_key: gpu_env
          notebook_task:
            notebook_path: ../notebooks/01_register_scgpt.py

        - task_key: update_model_catalog_scgpt_models_task
          depends_on:
            - task_key: "register_scgpt_task"
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/02_import_model_gwb.py

      environments:
        - environment_key: gpu_env
          spec:
            client: '4'
            dependencies:
              - --extra-index-url https://download.pytorch.org/whl/cu121
              - torch>=2.4
              - mlflow>=2.15
              - databricks-sdk>=0.50.0
            serverless_gpu:
              gpu_type: A10
        - environment_key: default
          spec:
            client: '4'

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: model_name
          default: scgpt
        - name: cache_dir
          default: ${resources.volumes.scgpt_cache_dir.name}
        - name: experiment_name
          default: ${var.module_registration_experiment_name}
        - name: sql_warehouse_id
          default: ${var.sql_warehouse_id}
        - name: user_email
          default: ${var.current_user}
        - name: workload_type
          default: ${var.gpu_large_setting}

      tags: ${var.common_resource_tags}
