resources:
  jobs:
    rapidssinglecell:
      name: run_rapidssinglecell_gwb

      email_notifications:
        on_failure:
          - ${var.current_user}

      tasks:
        - task_key: run_rapidssinglecell
          job_cluster_key: gpu_ml_cluster
          notebook_task:
            notebook_path: ../notebooks/analyze_single_h5ad.py
            base_parameters:
              data_path: ""
              gene_name_column: ""
              species: hsapiens
            source: WORKSPACE

      job_clusters:
        - job_cluster_key: gpu_ml_cluster
          new_cluster:
            num_workers: 0
            node_type_id: ${var.gpu_t4_rapids_node_type}
            driver_node_type_id: ${var.gpu_t4_rapids_node_type}
            spark_version: ${var.gpu_ml_spark_version}
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            single_user_name: ${workspace.current_user.userName}
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*, 4]
            custom_tags:
              ResourceClass: SingleNode
            aws_attributes:
              availability: ON_DEMAND

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: user_email
          default: ${var.current_user}
        - name: data_path
          default: dummy_data_path.h5ad
        - name: mlflow_experiment
          default: rapidssinglecell_genesis_workbench
        - name: mlflow_run_name
          default: rapidssinglecell_genesis_workbench
        - name: gene_name_column
          default: ""
        - name: species
          default: hsapiens
        - name: min_genes
          default: 200
        - name: min_cells
          default: 3
        - name: pct_counts_mt
          default: 5
        - name: n_genes_by_counts
          default: 2500
        - name: target_sum
          default: 10000
        - name: n_top_genes
          default: 500
        - name: n_pcs
          default: 50
        - name: cluster_resolution
          default: 0.2

      tags: ${var.common_resource_tags}
