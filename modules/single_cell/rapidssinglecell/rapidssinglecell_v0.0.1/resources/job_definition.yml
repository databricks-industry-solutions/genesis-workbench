resources:
  jobs:
    rapidssinglecell:
      name: run_rapidssinglecell_gwb

      email_notifications:
        on_failure:
          - ${var.current_user}

      tasks:
        - task_key: run_rapidssinglecell
          environment_key: gpu_env
          compute:
            hardware_accelerator: "GPU_1xA10"
          notebook_task:
            notebook_path: ../notebooks/analyze_single_h5ad.py
            base_parameters:
              data_path: ""
              gene_name_column: ""
              species: hsapiens
            source: WORKSPACE

      environments:
        - environment_key: gpu_env
          spec:
            environment_version: "4"
            dependencies:
              - --extra-index-url https://download.pytorch.org/whl/cu121
              - rapids-singlecell
              - scikit-learn>=1.5,<1.6
              - numpy<2

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: user_email
          default: ${var.current_user}
        - name: data_path
          default: dummy_data_path.h5ad
        - name: mlflow_experiment
          default: rapidssinglecell_genesis_workbench
        - name: mlflow_run_name
          default: rapidssinglecell_genesis_workbench
        - name: gene_name_column
          default: ""
        - name: species
          default: hsapiens
        - name: min_genes
          default: 200
        - name: min_cells
          default: 3
        - name: pct_counts_mt
          default: 5
        - name: n_genes_by_counts
          default: 2500
        - name: target_sum
          default: 10000
        - name: n_top_genes
          default: 500
        - name: n_pcs
          default: 50
        - name: cluster_resolution
          default: 0.2

      tags: ${var.common_resource_tags}
