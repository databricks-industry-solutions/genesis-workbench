bundle:
  name: genesis_workbench_teddy
  databricks_cli_version: ">=0.295.*"

include:
  - variables.yml
  - resources/*.yml

targets:
  prod_aws:
    mode: production
    default: true
    workspace:
      root_path: ${var.current_working_directory}
    permissions:
      - user_name: ${var.current_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.current_user}
    resources:
      jobs:
        register_teddy:
          job_clusters:
            - job_cluster_key: job_cluster_teddy
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND
            - job_cluster_key: job_cluster_teddy_a10_multinode
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND

  prod_azure:
    mode: production
    workspace:
      root_path: ${var.current_working_directory}
    permissions:
      - user_name: ${var.current_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.current_user}
    resources:
      jobs:
        register_teddy:
          job_clusters:
            - job_cluster_key: job_cluster_teddy
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE
            - job_cluster_key: job_cluster_teddy_a10_multinode
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE

  prod_gcp:
    mode: production
    workspace:
      root_path: ${var.current_working_directory}
    permissions:
      - user_name: ${var.current_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.current_user}
    resources:
      jobs:
        register_teddy:
          job_clusters:
            - job_cluster_key: job_cluster_teddy
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
            - job_cluster_key: job_cluster_teddy_a10_multinode
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
