resources:
  jobs:
    register_scimilarity:
      name: register_scimilarity

      email_notifications:
        on_failure:
          - ${var.current_user}

      tasks:
        #this task can use serverless (OR 14.3 LTS L runtime)
        - task_key: wget_SCimilarity_task # register_scimilarity_task
          ## use serverless when files already exist in the cache_dir
          job_cluster_key: job_cluster_wget # maybe faster than serverless?
          notebook_task:
            notebook_path: ../notebooks/01_wget_scimilarity.py

        - task_key: register_GeneOrder_task
          depends_on: 
            - task_key: wget_SCimilarity_task
          job_cluster_key: job_cluster_gene_order
          notebook_task:
            notebook_path: ../notebooks/02_register_GeneOrder.py 
        
        - task_key: register_GetEmbedding_task
          depends_on: 
            - task_key: wget_SCimilarity_task
          job_cluster_key: job_cluster_get_embedding
          notebook_task:
            notebook_path: ../notebooks/03_register_GetEmbedding.py 
        
        #this task can utilize serverless runtime with python 3.11
        - task_key: importNserve_scimilarity_models_task
          depends_on:
            - task_key: "register_GeneOrder_task"
            - task_key: "register_GetEmbedding_task"
          notebook_task:
            notebook_path: ../notebooks/05_importNserve_model_gwb.py

        # Extract disease/celltype sample data for 06b endpoint testing
        # Runs in parallel with register tasks after wget completes
        - task_key: extract_sample_data_task
          depends_on:
            - task_key: wget_SCimilarity_task
          job_cluster_key: job_cluster_search_nearest
          notebook_task:
            notebook_path: ../notebooks/06a_extractNsave_DiseaseCellTypeSamples.py

        # Externalize the 23M-cell reference to a Delta table for Vector Search.
        # Needs a memory-sized single-node cluster — CellQuery loads ~12 GB into RAM.
        # Runs in parallel with register_* tasks after wget completes.
        - task_key: extract_reference_to_delta_task
          depends_on:
            - task_key: wget_SCimilarity_task
          job_cluster_key: job_cluster_search_nearest
          notebook_task:
            notebook_path: ../notebooks/06b_extract_reference_to_delta.py

        # Create the Databricks Vector Search endpoint and Delta Sync index.
        # Lightweight — runs on serverless once the source Delta table exists.
        - task_key: create_cell_vector_index_task
          depends_on:
            - task_key: extract_reference_to_delta_task
          notebook_task:
            notebook_path: ../notebooks/06c_create_cell_vector_index.py

      environments: ## serverless
        - environment_key: default
          spec:
            client: '2'
            
      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: model_name
          default: SCimilarity
        - name: cache_dir
          default: ${resources.volumes.scimilarity.name} 
        - name: experiment_name
          default: ${var.module_registration_experiment_name} 
        - name: sql_warehouse_id
          default: ${var.sql_warehouse_id}
        - name: user_email
          default: ${var.current_user}
        - name: gene_order_workload_type
          default: CPU
        - name: gene_order_workload_size
          default: Small
        - name: get_embedding_workload_type
          default: MULTIGPU_MEDIUM
        - name: get_embedding_workload_size
          default: Small

      job_clusters:
        # wget only downloads files — CPU node is sufficient and cheaper than GPU
        - job_cluster_key: job_cluster_wget
          new_cluster:
            num_workers: 0
            node_type_id: ${var.cpu_node_type}
            driver_node_type_id: ${var.cpu_node_type}
            spark_version: '14.3.x-cpu-ml-scala2.12'
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            single_user_name: ${workspace.current_user.userName}
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode

        # GeneOrder registration runs utils.py which loads the ~23M cell reference DB (20-40 GB RAM)
        # via CellQuery(model_path); needs a high-memory node, not just the 50KB TSV it logs.
        - job_cluster_key: job_cluster_gene_order
          new_cluster:
            num_workers: 0
            node_type_id: ${var.cpu_xlarge_node_type}
            driver_node_type_id: ${var.cpu_xlarge_node_type}
            spark_version: '14.3.x-cpu-ml-scala2.12'
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            single_user_name: ${workspace.current_user.userName}
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode

        - job_cluster_key: job_cluster_get_embedding
          new_cluster:
            num_workers: 0
            ### NEED larger compute for SCimilarity
            node_type_id: ${var.a10_node_type}   
            driver_node_type_id: ${var.a10_node_type}  
            spark_version: '14.3.x-gpu-ml-scala2.12'
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            single_user_name: ${workspace.current_user.userName}
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode

        - job_cluster_key: job_cluster_search_nearest
          new_cluster:
            num_workers: 0
            ### NEED larger RAM compute for SCimilarity: search_nearest
            node_type_id: ${var.a10_node_type} 
            driver_node_type_id: ${var.a10_node_type}   
            spark_version: '14.3.x-gpu-ml-scala2.12'
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            single_user_name: ${workspace.current_user.userName}
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode

        ## critical for model training
        ## singleNode GPU options: ## Standard_NV36ads_A10_v5 #440gigs #'Standard_NC16as_T4_v3' #110gigs #'Standard_NC4as_T4_v3'  
        ## 14.3.x-gpu-ml-scala2.12

        ## singleNode CPU options: # Standard_E48ads_v5 #384gigs # Standard_E32ads_v5 #256gigs 
        ## 14.3.x-cpu-ml-scala2.12

      tags: ${var.common_resource_tags}