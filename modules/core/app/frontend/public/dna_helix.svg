<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Two intertwined strands, S-curved so the favicon reads as a DNA double helix. -->
  <path d="M 18 4 C 48 16, 48 16, 18 32 C -12 48, -12 48, 18 60"
        stroke="#3b82f6" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 46 4 C 16 16, 16 16, 46 32 C 76 48, 76 48, 46 60"
        stroke="#ef4444" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Rungs connecting the strands at their crossing points. -->
  <line x1="22" y1="10" x2="42" y2="10" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="22" x2="46" y2="22" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="42" x2="46" y2="42" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <line x1="22" y1="54" x2="42" y2="54" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
</svg>
