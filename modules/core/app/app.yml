command:
  - "sh"
  - "-c"
  - "uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port ${DATABRICKS_APP_PORT:-8000}"

env:
  - name: SQL_WAREHOUSE
    valueFrom: "sql_warehouse"
  - name: CORE_CATALOG_NAME
    valueFrom: "core_catalog_name"
  - name: CORE_SCHEMA_NAME
    valueFrom: "core_schema_name"
  - name: LLM_ENDPOINT_NAME
    valueFrom: "llm_endpoint"
  - name: NARRATIVE_LLM_ENDPOINT_NAME
    valueFrom: "narrative_llm_endpoint"
  - name: DEV_USER_PREFIX
    valueFrom: "dev_user_prefix"
  # DATABRICKS_APP_NAME is auto-injected by the Databricks Apps runtime with the
  # real app name (docs: dev-tools/databricks-apps/system-env). Do NOT hardcode it:
  # a static value (e.g. "genesis-workbench") overrides the real name (gwb-app) and
  # breaks apps.get(name=...) in bootstrap.py, surfacing "(app service principal id
  # not available)" on the Profile > MLflow Setup page.
