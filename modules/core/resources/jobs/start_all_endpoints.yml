resources:
  jobs:
    start_all_endpoints_job:
      name: dbx_gwb_start_all_endpoints

      email_notifications:
        on_failure:
          - ${var.current_user}

      tasks:
        - task_key: start_all_endpoints_task
          notebook_task:
            notebook_path: ../../notebooks/start_all_endpoints.py
          max_retries: 0

      environments:
        - environment_key: default
          spec:
            client: '4'

      max_concurrent_runs: 1

      # The app triggers this job as its service principal (Settings → Endpoint
      # Management → Start All Endpoints), so the SP needs run rights. Declared
      # here so it persists across app deploys (which otherwise override the
      # job ACL and drop the SP → run_now 403 → HTTP 500).
      permissions:
        - level: CAN_MANAGE_RUN
          service_principal_name: ${resources.apps.genesis_workbench_app.service_principal_client_id}

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: sql_warehouse_id
          default: ${var.sql_warehouse_id}
        - name: num_hours
          default: '4'

      tags: ${var.common_resource_tags}
