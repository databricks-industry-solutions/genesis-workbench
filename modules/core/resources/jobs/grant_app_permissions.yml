resources:
  jobs:
    grant_app_permissions_job:
      name: dbx_gwb_grant_app_permissions

      email_notifications:
        on_failure:
          - ${var.current_user}

      tasks:
        - task_key: grant_permissions_task
          notebook_task:
            notebook_path: ../../notebooks/grant_app_permissions.py
          max_retries: 0
          timeout_seconds: 600

      environments:
        - environment_key: default
          spec:
            client: '4'

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: databricks_app_name
          default: ${var.app_name}
        - name: sql_warehouse_id
          default: ${var.sql_warehouse_id}

      tags: ${var.common_resource_tags}
