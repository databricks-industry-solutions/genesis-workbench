resources:
  jobs:
    variant_annotation_initial_setup_job:
      name: dbx_variant_annotation_initial_setup

      email_notifications:
        on_failure:
          - ${var.current_user}

      tasks:
        - task_key: download_clinvar
          job_cluster_key: variant_annotation_setup_cluster
          libraries:
            - jar: /Volumes/${var.core_catalog_name}/${var.core_schema_name}/libraries/glow-spark3-assembly-2.0.4-SNAPSHOT.jar
          notebook_task:
            notebook_path: ../notebooks/00_download_clinvar.py
            source: WORKSPACE

        - task_key: initialize
          depends_on:
            - task_key: download_clinvar
          notebook_task:
            notebook_path: ../notebooks/initialize.py
          max_retries: 0
          timeout_seconds: 600

      environments:
        - environment_key: default
          spec:
            client: '4'

      parameters:
        - name: catalog
          default: ${var.core_catalog_name}
        - name: schema
          default: ${var.core_schema_name}
        - name: sql_warehouse_id
          default: ${var.sql_warehouse_id}
        - name: variant_annotation_job_id
          default: ${resources.jobs.variant_annotation.id}
        - name: variant_annotation_dashboard_id
          default: ${resources.dashboards.brca_cancer_risk.id}
        - name: user_email
          default: ${var.current_user}

      job_clusters:
        - job_cluster_key: variant_annotation_setup_cluster
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-scala2.12
            spark_conf:
              spark.master: "local[*, 4]"
              spark.databricks.cluster.profile: singleNode
            node_type_id: ${var.cpu_node_type}
            driver_node_type_id: ${var.cpu_node_type}
            custom_tags:
              ResourceClass: SingleNode
              work_type: variant_annotation_setup
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
            aws_attributes:
              availability: ON_DEMAND

      tags: ${var.common_resource_tags}
