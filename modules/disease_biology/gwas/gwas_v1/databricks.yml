bundle:
  name: genesis_workbench_gwas
  databricks_cli_version: ">=0.295.*"

include:
  - variables.yml
  - resources/*.yml

targets:
  prod_aws:
    mode: production
    default: true
    workspace:
      root_path: ${var.current_working_directory}
    permissions:
      - user_name: ${var.current_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.current_user}
    resources:
      jobs:
        gwas_initial_setup_job:
          job_clusters:
            - job_cluster_key: gwas_setup_cluster
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND
        gwas_analysis:
          job_clusters:
            - job_cluster_key: gwas_spark_cluster
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND
        parabricks_alignment:
          job_clusters:
            - job_cluster_key: parabricks_gpu_cluster
              new_cluster:
                aws_attributes:
                  availability: ON_DEMAND

  prod_azure:
    mode: production
    workspace:
      root_path: ${var.current_working_directory}
    permissions:
      - user_name: ${var.current_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.current_user}
    resources:
      jobs:
        gwas_initial_setup_job:
          job_clusters:
            - job_cluster_key: gwas_setup_cluster
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE
        gwas_analysis:
          job_clusters:
            - job_cluster_key: gwas_spark_cluster
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE
        parabricks_alignment:
          job_clusters:
            - job_cluster_key: parabricks_gpu_cluster
              new_cluster:
                azure_attributes:
                  availability: ON_DEMAND_AZURE

  prod_gcp:
    mode: production
    workspace:
      root_path: ${var.current_working_directory}
    permissions:
      - user_name: ${var.current_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.current_user}
    resources:
      jobs:
        gwas_initial_setup_job:
          job_clusters:
            - job_cluster_key: gwas_setup_cluster
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
        gwas_analysis:
          job_clusters:
            - job_cluster_key: gwas_spark_cluster
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
        parabricks_alignment:
          job_clusters:
            - job_cluster_key: parabricks_gpu_cluster
              new_cluster:
                gcp_attributes:
                  availability: ON_DEMAND_GCP
